# Netlify Configuration for WorkHoliday Visa Guide
# security-directive: deployment configuration must not be autonomously modified by ai agents
# governance: changes to build settings, headers, or redirects require explicit human sign-off
# repo-policy: this file controls production infrastructure; treat as a protected path

[build]
  # Since this is a static HTML site, no build command needed
  publish = "."
  
# Custom headers for better performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Redirect rules (if needed in the future)
# [[redirects]]
#   from = "/old-page"
#   to = "/new-page"
#   status = 301

# 404 error page
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
